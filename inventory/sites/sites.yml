# Site Registry -- ASN Allocation
#
# Each region has 64 site_ids (32 sites, even IDs only).
# ASN = 65000 + site_id
#
# Site grouping: pair_index 0 = hub, all others = spoke
# Hub sites are regional aggregation points (WAN backbone).
# Spoke sites connect to the regional hub via intra-region WAN.
#
# To add a new site:
#   1. Assign the next available even site_id in the correct region
#   2. Create a directory: inventory/sites/<SITE>/hosts.yml
#   3. Run: provision <SITE> --dry-run
#
# To decommission a site:
#   1. Remove its entry below
#   2. Delete its directory: inventory/sites/<SITE>/
#   3. Run the provisioning script -- it will remove the site from NetBox

regions:
  AMER:
    range: 0-63
    sites:
      DCAMER: 0       # hub
      # 2: available  (spoke)
      # 4: available  (spoke)
      # 6: available  (spoke)
      # 8: available  (spoke)
      # 10: available (spoke)

  EMEA:
    range: 64-127
    sites:
      DCEMEA: 64      # hub
      EQ4LON: 66      # spoke
      # 68: available  (spoke)
      # 70: available  (spoke)
      # 72: available  (spoke)
      # 74: available  (spoke)

  APAC:
    range: 128-191
    sites:
      # 128: available (hub)
      # 130: available (spoke)
      # 132: available (spoke)
      # 134: available (spoke)
      # 136: available (spoke)
