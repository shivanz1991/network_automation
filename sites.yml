# Network Site Inventory — Desired State
#
# This file declares which sites exist and what devices are at each site.
# Everything else (IPs, VLANs, prefixes, ASNs) is derived from the site_id
# and device name using formulas defined in network_standards/.
#
# The provisioning script reads this file, computes all derived data, and
# ensures NetBox matches this desired state — including removing sites or
# devices that have been deleted from this file.
#
# Workflow:
#   1. Edit this file (add/remove sites or devices)
#   2. Commit and get peer review
#   3. Run: python3 netbox/provision_site.py --dry-run
#   4. Run: python3 netbox/provision_site.py
#   5. Changes are made in a NetBox branch for approval before merging to main

sites:
  DCAMER:
    site_id: 0
    devices:
      - MGTSW1A
      - MGTSW1B
      - INFSW1A
      - INFSW1B
      - CONSOLE1A
      - CONSOLE1B

  EQ4LON:
    site_id: 64
    devices:
      - MGTSW1A
      - MGTSW1B
      - INFSW1A
      - INFSW1B
      - TRDSW1A
      - TRDSW1B
      - TRDSW2A
      - TRDSW2B
      - TIMESERVER1A
      - TIMESERVER1B
      - PTPSW1A
      - PTPSW1B
      - CONSOLE1A
      - CONSOLE1B
